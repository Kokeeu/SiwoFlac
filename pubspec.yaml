name: neroflac
description: SiwöFlac - Download music in true lossless FLAC from extension-provided sources on Android.
publish_to: "none"
version: 4.7.0+136

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  flutter_riverpod: ^3.3.2

  # Navigation
  go_router: ^17.3.0

# Storage & Persistence
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.3.1
  path_provider: ^2.1.5
  path: ^1.9.0
  sqflite: ^2.4.3

# HTTP & Network
  http: ^1.6.0
  connectivity_plus: ^7.1.1

  # UI Components
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  # Permissions
  permission_handler: ^12.0.3

  # File Picker
  file_picker: ^12.0.0-beta.5

  # JSON Serialization
  json_annotation: ^4.12.0

  # Utils
  url_launcher: ^6.3.1
  device_info_plus: ^13.1.0
  share_plus: ^13.1.0
  receive_sharing_intent: ^1.8.1
  logger: ^2.5.0

  # YouTube playlist extraction (fallback when the YouTube Music extension
  # can't handle the URL).
  youtube_explode_dart: ^3.1.0

  # FFmpeg for audio conversion
  ffmpeg_kit_flutter_new_full: ^2.1.0
  open_filex: ^4.7.0

  # Notifications
  flutter_local_notifications: ^22.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4
  riverpod_lint: ^3.1.4
  json_serializable: ^6.14.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0D9488"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  adaptive_icon_monochrome: "assets/icon/icon_monochrome.png"
  ios_content_mode: scaleAspectFill

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icon/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-VariableFont_wght.ttf
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Italic-Variable.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
    - family: Mona Sans
      fonts:
        - asset: assets/fonts/MonaSans-VariableFont_wght.ttf
    - family: Mona Sans Mono
      fonts:
        - asset: assets/fonts/MonaSansMono-Variable.ttf
